# Update flake.lock weekly (Sunday 00:00 UTC).
name: Update flake inputs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      checks: read
      statuses: read

    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Update flake.lock
        id: pr
        uses: DeterminateSystems/update-flake-lock@main
        with:
          pr-title: "chore: update flake inputs"

    outputs:
      pull-request-url: ${{ steps.pr.outputs.pull-request-url }}

  merge:
    needs: update
    uses: ./.github/workflows/auto-merge.yml
    with:
      pull-request-url: ${{ needs.update.outputs.pull-request-url }}
    permissions:
      contents: write
      pull-requests: write
      checks: read
      statuses: read
